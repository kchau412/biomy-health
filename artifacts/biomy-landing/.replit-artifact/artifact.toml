kind = "web"
previewPath = "/"
title = "Biomy Landing Page"
version = "1.0.0"
id = "artifacts/biomy-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23858

[services.development]
run = "pnpm --filter @workspace/biomy-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/biomy-landing", "run", "build" ]
publicDir = "artifacts/biomy-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23858"
BASE_PATH = "/"
